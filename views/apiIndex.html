<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>YogiTrack API</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div class="container">
    <div class="back-link">
      <a href="/app">&larr; Back to Dashboard</a>
    </div>

    <div class="header">
      <h1>YogiTrack API</h1>
      <p>Development &amp; Testing Console</p>
    </div>

    <div class="card">
      <h2>Status</h2>
      <div class="api-status-row">
        <div class="api-status-item">
          <span class="api-status-label">Database</span>
          {{dbStatus}}
          <a href="/status" class="api-status-detail-link">Details</a>
        </div>
        <div class="api-status-item">
          <span class="api-status-label">Session</span>
          {{loginStatus}}
        </div>
      </div>
    </div>

    <div class="card">
      <h2>Modules</h2>
      <p>Select a module to view its methods and test endpoints. &nbsp;<a href="/api/reference">View full API reference &rarr;</a></p>
      <div class="module-grid">
        {{moduleLinks}}
      </div>
    </div>

    <footer>
      <p>&copy; 2026 YogiTrack. All rights reserved.</p>
    </footer>
  </div>
</body>
</html>
